apply plugin: 'com.android.application'

android {
    namespace 'com.histalytics.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.histalytics.app'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.webkit:webkit:1.12.1'
}
